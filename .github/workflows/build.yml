name: 'publish'

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build for (choose a single target or "all")'
        required: false
        type: choice
        default: 'all'
        options:
          - all
          - macos-aarch64
          - macos-x86_64
          - ubuntu
          - ubuntu-arm
          - windows
  push:
    branches:
      - master

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: 'macos-aarch64'
            runs_on: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - id: 'macos-x86_64'
            runs_on: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - id: 'ubuntu'
            runs_on: 'ubuntu-22.04'
            args: ''
          - id: 'ubuntu-arm'
            runs_on: 'ubuntu-22.04-arm'
            args: ''
          - id: 'windows'
            runs_on: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.runs_on }}
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.platform == '' || github.event.inputs.platform == 'all' || github.event.inputs.platform == matrix.id }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.runs_on == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: ./src/package-lock.json

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.runs_on == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src/src-tauri -> target'

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}      
        with:
          tagName: cosmiccomics-v__VERSION__
          releaseName: 'CosmicComics v__VERSION__'
          releaseBody: 'CosmicComics  release v__VERSION__'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}