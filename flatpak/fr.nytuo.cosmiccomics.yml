id: fr.nytuo.cosmiccomics

runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk

command: tauri-app
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --share=ipc
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=host
  - --share=network

modules:
  - name: binary
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/Nytuo/CosmicComics/releases/download/v3.0.0/cosmiccomics_3.0.0_amd64.deb
        sha256: 1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
        only-arches: [x86_64]
      - type: file
        url: https://github.com/Nytuo/CosmicComics/releases/download/v3.0.0/cosmiccomics_3.0.0_arm.deb
        sha256: 1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
        only-arches: [aarch64]

    build-commands:
      - ar -x *.deb
      - tar -xf data.tar.gz
      - 'install -Dm755 usr/bin/tauri-app /app/bin/tauri-app'
      - install -Dm644 usr/share/applications/${FLATPAK_ID}.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 usr/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png /app/share/icons/hicolor/128x128/apps/${FLATPAK_ID}.png
      - install -Dm644 usr/share/icons/hicolor/32x32/apps/${FLATPAK_ID}.png /app/share/icons/hicolor/32x32/apps/${FLATPAK_ID}.png
      - install -Dm644 usr/share/icons/hicolor/256x256@2/apps/${FLATPAK_ID}.png /app/share/icons/hicolor/256x256@2/apps/${FLATPAK_ID}.png
      - install -Dm644 ${FLATPAK_ID}.metainfo.xml /app/share/metainfo/${FLATPAK_ID}.metainfo.xml